name: plugboard

services:
  rabbitmq:
    image: rabbitmq:4.2-debian13
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - main
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
    restart: always

  postgres:
    image: postgres:18.2-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=plugboard
      - POSTGRES_PASSWORD=plugboard
      - POSTGRES_DB=plugboard
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - main
    restart: always

  redis:
    image: redis:8.6-alpine
    container_name: redis
    command: redis-server --bind 0.0.0.0 --protected-mode no
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    networks:
      - main
    restart: always

networks:
  main:
    driver: bridge

volumes:
  rabbitmq-data:
  postgres-data:
  redis-data:
